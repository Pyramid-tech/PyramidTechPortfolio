services:
  web:
    build: .
    container_name: pyramid-portfolio
    ports:
      - '3400:3400'
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      - logs:/app/logs
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pyramid-worker
    env_file:
      - .env.production
    volumes:
      - logs:/app/logs
    restart: unless-stopped

volumes:
  logs:
