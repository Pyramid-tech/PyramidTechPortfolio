services:
  web:
    build: .
    container_name: pyramid-portfolio
    ports:
      - '3400:3400'
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3400/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pyramid-worker
    env_file:
      - .env.production
    volumes:
      - logs:/app/logs
    restart: unless-stopped

volumes:
  logs:
