<svg width="430" height="880" viewBox="0 0 430 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Center ambient blob (sits behind the hero text) -->
  <circle cx="215" cy="430" r="200" fill="url(#blob)"/>
  <!-- Scattered accent circles, small and spread toward the edges -->
  <g fill="url(#accent)" fill-opacity="0.6">
    <circle cx="62" cy="180" r="34"/>
    <circle cx="372" cy="150" r="28"/>
    <circle cx="350" cy="430" r="40"/>
    <circle cx="58" cy="650" r="66"/>
    <circle cx="388" cy="690" r="78"/>
    <circle cx="120" cy="800" r="30"/>
  </g>
  <defs>
    <linearGradient id="blob" x1="215" y1="230" x2="215" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#211F26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#404040"/>
      <stop offset="1" stop-color="#404040" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
